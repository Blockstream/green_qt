.linux-x86_64:
  image: borgbyte/green_qt:linux-x86_64@sha256:6e55f87e3dc6c7cc02eeb7eca98703dd25cf373767b12b98bf1f0d980f81aac6
  extends:
    - .build
  tags:
    - cloud

linux-x86_64:build-appimage:
  extends:
    - .linux-x86_64
  after_script:
    - tools/appimage.sh $CI_PROJECT_DIR
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    paths:
      - BlockstreamGreen-x86_64.AppImage

linux-x86_64:build-binary:
  extends:
    - .linux-x86_64
  variables:
    GREEN_WAYLAND: "ON"
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_JOB_NAME-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    paths:
      - green
